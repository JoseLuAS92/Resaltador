body {

.header {

.content {

.sidebar {

.toggle {

textarea {

    height: 160px;

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}

function limpiarTexto() {
    document.getElementById("texto").value = "";
    document.getElementById("resultado").innerHTML = "";
}

function escaparRegex(texto) {
    return texto.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function construirMapa() {
    const mapa = {};

    function agregar(texto, clase) {
        texto.split("\n")
            .map(t => t.trim())
            .filter(t => t.length > 0)
            .forEach(t => mapa[t.toLowerCase()] = clase);
    }

    agregar(document.getElementById("patologia").value, "patologia");
    agregar(document.getElementById("altocosto").value, "altocosto");
    agregar(document.getElementById("huerfana").value, "huerfana");
    agregar(document.getElementById("medicamento").value, "medicamento");

    return mapa;
}

function analizar() {
    const texto = document.getElementById("texto").value;
    const mapa = construirMapa();

    const palabras = Object.keys(mapa)
        .sort((a,b) => b.length-a.length)
        .map(escaparRegex);

    if (!palabras.length) {
        document.getElementById("resultado").innerText = texto;
        return;
    }

    const regex = new RegExp("(?<!\\w)(" + palabras.join("|") + ")(?!\\w)", "gi");

    document.getElementById("resultado").innerHTML =
        texto.replace(regex, m =>
            `<span class="${mapa[m.toLowerCase()]}">${m}</span>`
        );
}
</script>
