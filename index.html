<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.logo {
    height: auto;
    max-height: 80px;
    object-fit: contain;
}

.referencia-img {
    max-width: 350px;
    width: 100%;
    border-radius: 6px;
    border: 1px solid #ddd;
}

.header {
    background: linear-gradient(to right, #003366, #007acc);
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 70px;
}

.main {
    display: flex;
}

.content {
    flex: 1;
    padding: 20px;
}

.sidebar {
    width: 0;
    background: #ffffff;
    overflow: hidden;
    transition: 0.3s;
    border-left: 2px solid #ddd;
}

.sidebar.active {
    width: 320px;
    padding: 15px;
}

button {
    background: #007acc;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 5px;
}

.toggle {
    background: #555;
}

textarea {
    width: 100%;
    height: 160px;
    margin-bottom: 10px;
    padding: 10px;
}

#resultado {
    flex: 1;
    padding: 15px;
    background: white;
    border-radius: 8px;
    min-height: 180px;
}

.patologia { color: red; font-weight: bold; text-decoration: underline; }
.altocosto { color: purple; font-weight: bold; text-decoration: underline; }
.huerfana { color: blue; font-weight: bold; text-decoration: underline; }
.medicamento { color: green; font-weight: bold; text-decoration: underline; }
.gestores { 
    color: #c9a200;   /* amarillo más visible que “yellow” puro */
    font-weight: bold; 
    text-decoration: underline;
}
    
.titulo {
    font-weight: bold;
    margin-top: 10px;
}

.leyenda {
    background: white;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    max-width: 360px;
    position: sticky;
    top: 20px;
}
    
.resultado-fila {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}
</style>
</head>

<script>
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("active");
}

function limpiarTexto() {
    document.getElementById("texto").value = "";
    document.getElementById("resultado").innerHTML = "";
}

function escaparRegex(texto) {
    return texto.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function construirMapa() {
    const mapa = {};

    function agregar(texto, clase) {
        texto.split("\n")
            .map(t => t.trim())
            .filter(t => t.length > 0)
            .forEach(t => mapa[t.toLowerCase()] = clase);
    }

    agregar(document.getElementById("patologia").value, "patologia");
    agregar(document.getElementById("altocosto").value, "altocosto");
    agregar(document.getElementById("huerfana").value, "huerfana");
    agregar(document.getElementById("medicamento").value, "medicamento");
    agregar(document.getElementById("Gestores").value, "gestores");

    return mapa;
}

function analizar() {
    const texto = document.getElementById("texto").value;
    const mapa = construirMapa();

    const palabras = Object.keys(mapa)
        .sort((a,b) => b.length-a.length)
        .map(escaparRegex);

    if (!palabras.length) {
        document.getElementById("resultado").innerText = texto;
        return;
    }

    const regex = new RegExp("(?<!\\w)(" + palabras.join("|") + ")(?!\\w)", "gi");

    document.getElementById("resultado").innerHTML =
        texto.replace(regex, m =>
            `<span class="${mapa[m.toLowerCase()]}">${m}</span>`
        );
}
</script>
