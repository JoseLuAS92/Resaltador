<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Analizador de Palabras Clave</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

.header {
    background: linear-gradient(to right, #003366, #007acc);
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header img {
    height: 70px;
}

.main {
    display: flex;
}

.content {
    flex: 1;
    padding: 20px;
}

.sidebar {
    width: 0;
    background: #ffffff;
    overflow: hidden;
    transition: 0.3s;
    border-left: 2px solid #ddd;
}

.sidebar.active {
    width: 320px;
    padding: 15px;
}

button {
    background: #007acc;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 5px;
}

.toggle {
    background: #555;
}

textarea {
    width: 100%;
    height: 110px;
    margin-bottom: 10px;
    padding: 10px;
}

.resultado-container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

#resultado {
    flex: 2;
    padding: 15px;
    background: white;
    border-radius: 8px;
    min-height: 150px;
}

.referencia {
    flex: 1;
    background: white;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
}

.referencia img {
    width: 100%;
    max-width: 350px;
}

.patologia { color: red; font-weight: bold; text-decoration: underline; }
.altocosto { color: purple; font-weight: bold; text-decoration: underline; }
.huerfana { color: blue; font-weight: bold; text-decoration: underline; }
.medicamento { color: green; font-weight: bold; text-decoration: underline; }

.titulo {
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h2>🔍 Analizador de Casos</h2>
    <img src="logo-supersalud.png">
</div>

<div class="main">

<div class="content">

<button class="toggle" onclick="toggleSidebar()">☰ Configurar palabras</button>

<h3>Texto a analizar</h3>
<textarea id="texto"></textarea>
